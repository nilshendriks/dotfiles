# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -s escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits (open in current path)
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Session picker (fzf popup, excludes current session)
bind s display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# New named session
bind S command-prompt -p "New session:" "new-session -s '%%'"

# Kill session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ── Tokyo Night theme ──────────────────────────────────────────────────────────
color_bg="#1a1b26"
color_fg="#c0caf5"
color_accent="#7aa2f7"
color_green="#9ece6a"
color_yellow="#e0af68"
color_red="#f7768e"
color_gray="#565f89"
color_dark="#16161e"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=${color_dark},fg=${color_fg}"

set -g status-left-length 40
set -g status-left "#[fg=${color_dark},bg=${color_accent},bold] #S #[fg=${color_accent},bg=${color_dark}] "

set -g status-right-length 80
set -g status-right "#[fg=${color_gray}] %H:%M  #[fg=${color_accent},bold]#h "

set -g window-status-format "#[fg=${color_gray}] #I:#W "
set -g window-status-current-format "#[fg=${color_dark},bg=${color_accent}] #I:#W #[fg=${color_accent},bg=${color_dark}]"

set -g pane-border-style "fg=${color_gray}"
set -g pane-active-border-style "fg=${color_accent}"

set -g message-style "fg=${color_fg},bg=${color_dark}"

# ── TPM + Plugins ──────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
